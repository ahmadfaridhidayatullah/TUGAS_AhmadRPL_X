<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Form HTML</title>

    <style>
        body{
            font-family: Arial, sans-serif;
            background-color: white;
        }

        .container{
            width: 700px;
            margin: 50px auto;
            border: 3px solid red;
            padding: 40px;
        }

        .header{
            background-color: #eef0b5;
            height: 30px;
            margin-bottom: 50px;
        }

        table{
            margin: auto;
        }

        td{
            padding: 5px;
        }

        input{
            width: 180px;
            height: 22px;
        }

        .btn{
            width: 80px;
            height: 30px;
        }

        .footer{
            background-color: #eef0b5;
            text-align: center;
            margin-top: 50px;
            padding: 10px;
            font-size: 12px;
        }
    </style>
</head>

<body>

    <div class="container">

        <div class="header"></div>

        <form>
            <table>
                <tr>
                    <td>NIM</td>
                    <td>:</td>
                    <td><input type="text"></td>
                </tr>

                <tr>
                    <td>NAMA</td>
                    <td>:</td>
                    <td><input type="text"></td>
                </tr>

                <tr>
                    <td>Jurusan</td>
                    <td>:</td>
                    <td><input type="text"></td>
                </tr>

                <tr>
                    <td>PASSWORD</td>
                    <td>:</td>
                    <td><input type="password"></td>
                </tr>

                <tr>
                    <td></td>
                    <td></td>
                    <td>
                        <input type="submit" value="SIMPAN" class="btn">
                    </td>
                </tr>
            </table>
        </form>

        <div class="footer">
            Code By SMK MUHAMMADIYAH JAKARTA <br>
            © 2014
        </div>

    </div>

</body>
</html>

<<!DOCTYPE html>
<html lang="id">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">

  <title>Robby Pantjoro</title>

  <style>

    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial, Helvetica, sans-serif;
    }

    body{
      height:100vh;
      display:flex;
      justify-content:center;
      align-items:center;
      background:#0f172a;
      overflow:hidden;
    }

    .background{
      position:absolute;
      width:100%;
      height:100%;
      background:
      radial-gradient(circle at top left,#00ffff33,transparent 30%),
      radial-gradient(circle at bottom right,#8b5cf633,transparent 30%),
      #020617;
    }

    .card{
      position:relative;
      width:370px;
      padding:35px;
      border-radius:30px;
      background:rgba(255,255,255,0.05);
      backdrop-filter:blur(15px);
      border:1px solid rgba(255,255,255,0.1);
      text-align:center;
      box-shadow:0 0 40px rgba(0,255,255,0.25);
      animation:float 4s ease-in-out infinite;
    }

    .card::before{
      content:'';
      position:absolute;
      inset:-2px;
      border-radius:30px;
      padding:2px;
      background:linear-gradient(45deg,#00ffff,#8b5cf6,#00ffff);
      -webkit-mask:
      linear-gradient(#fff 0 0) content-box,
      linear-gradient(#fff 0 0);

      -webkit-mask-composite:xor;
      mask-composite:exclude;
    }

    .profile{
      width:170px;
      height:170px;
      border-radius:50%;
      object-fit:cover;
      border:5px solid cyan;
      box-shadow:0 0 30px cyan;
      margin-bottom:20px;
    }

    h1{
      color:#00ffff;
      font-size:38px;
      margin-bottom:10px;
      text-shadow:0 0 20px cyan;
    }

    h3{
      color:#cbd5e1;
      margin-bottom:20px;
      letter-spacing:3px;
    }

    p{
      color:#94a3b8;
      line-height:1.7;
      margin-bottom:25px;
    }

    .btn{
      display:inline-block;
      padding:12px 28px;
      border-radius:40px;
      text-decoration:none;
      color:white;
      font-weight:bold;
      background:linear-gradient(45deg,#06b6d4,#8b5cf6);
      box-shadow:0 0 20px rgba(0,255,255,0.5);
      transition:0.3s;
    }

    .btn:hover{
      transform:scale(1.08);
      box-shadow:0 0 35px cyan;
    }

    .social{
      margin-top:25px;
      display:flex;
      justify-content:center;
      gap:15px;
    }

    .social a{
      width:45px;
      height:45px;
      border-radius:50%;
      display:flex;
      justify-content:center;
      align-items:center;
      background:rgba(255,255,255,0.08);
      color:white;
      text-decoration:none;
      font-size:20px;
      transition:0.3s;
    }

    .social a:hover{
      background:cyan;
      color:black;
      transform:translateY(-5px);
    }

    @keyframes float{
      0%{
        transform:translateY(0px);
      }

      50%{
        transform:translateY(-10px);
      }

      100%{
        transform:translateY(0px);
      }
    }

  </style>

  <!-- ICON -->
  <link rel="stylesheet"
  href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">

</head>

<body>

  <div class="background"></div>

  <div class="card">

    <!-- GANTI FOTO -->
    <img src="ROBYIMAGE(1).png" class="profile">

    <h1>ROBBY</h1>

    <h3>FRONTEND DEVELOPER</h3>

    <p>
      "Kenapa nyakk?"
      <br><br>
      Website modern • Cyber UI • HTML CSS JS
    </p>

    <a href="#" class="btn">FOLLOW ME</a>

    <div class="social">
      <a href="#"><i class="fab fa-instagram"></i></a>
      <a href="#"><i class="fab fa-tiktok"></i></a>
      <a href="#"><i class="fab fa-youtube"></i></a>
      <a href="#"><i class="fab fa-github"></i></a>
    </div>

  </div>

</body>
</html>
